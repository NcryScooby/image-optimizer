services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: imageopt
      POSTGRES_PASSWORD: imageopt
      POSTGRES_DB: imageopt
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U imageopt -d imageopt"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    ports:
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 15s

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data

  imgproxy:
    image: darthsim/imgproxy:v3.25.0
    environment:
      IMGPROXY_USE_S3: "true"
      IMGPROXY_S3_ENDPOINT: http://minio:9000
      IMGPROXY_S3_REGION: us-east-1
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      IMGPROXY_USE_ETAG: "true"
      # Unsigned URLs on the internal Docker network only (no public port).
      IMGPROXY_KEY: ""
      IMGPROXY_SALT: ""
    depends_on:
      - minio
    # No ports: reachable only as http://imgproxy:8080 on the compose network.

  api:
    build: .
    command: ["serve"]
    restart: on-failure
    ports:
      - "8080:8080"
    environment: &app_env
      DATABASE_URL: postgres://imageopt:imageopt@postgres:5432/imageopt?sslmode=disable
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      IMGPROXY_URL: http://imgproxy:8080
      S3_ENDPOINT: http://minio:9000
      S3_REGION: us-east-1
      S3_BUCKET: images
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_USE_PATH_STYLE: "true"
      HTTP_ADDR: ":8080"
      MAX_UPLOAD_BYTES: "10485760"
      RETRY_AFTER_SECONDS: "2"
      DEFAULT_QUALITY: "80"
    healthcheck:
      # alpine:3.20 base image has busybox wget (no curl); fails on HTTP errors (e.g. 503)
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      imgproxy:
        condition: service_started
      minio:
        condition: service_started

  worker:
    build: .
    command: ["worker"]
    restart: on-failure
    ports:
      - "9091:9091"
    environment:
      <<: *app_env
      METRICS_ADDR: ":9091"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9091/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      imgproxy:
        condition: service_started
      minio:
        condition: service_started

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    depends_on:
      - api
      - worker

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  postgres_data:
  grafana_data:
  minio_data:
